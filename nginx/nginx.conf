# 경로: nginx/nginx.conf
# 용도: Nginx 리버스 프록시 설정 (배포 시 사용)

events {}

http {

server {
    listen 80;
    server_name channi-web-sample.shop www.channi-web-sample.shop;

    # ─── 프론트엔드 요청 처리 ─────────────────────────────────
    # /로 시작하는 모든 요청 → React 앱 컨테이너로
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── 백엔드 API 요청 처리 ────────────────────────────────
    # /api/로 시작하는 요청 → Spring Boot 컨테이너로
    # 왜 Nginx를 거치나? → 8080 포트를 외부에 노출하지 않아도 되고,
    # SSL 처리를 Nginx 한 곳에서만 하면 되기 때문
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

}
