# 경로: frontend/nginx.conf
# 프론트엔드 컨테이너 안의 Nginx 설정

server {
    listen 80;

    # /api/ 로 시작하는 요청 → 백엔드 컨테이너로 프록시
    # 컨테이너끼리는 docker-compose 서비스 이름으로 통신 가능 ("backend")
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 나머지 요청 → React 빌드 결과물 서빙
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA 라우팅: /profile, /login 같은 경로도 index.html로 보냄
        try_files $uri $uri/ /index.html;
    }
}
